version: '3.8'

services:
  # Frontend - Next.js
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api/v1
    depends_on:
      - backend
    networks:
      - lemonclaim-network

  # Backend - FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./lemonclaim.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend/lemonclaim.db:/app/lemonclaim.db
      - ./backend/uploads:/app/uploads
    depends_on:
      - redis
    networks:
      - lemonclaim-network

  # Redis - Caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - lemonclaim-network

networks:
  lemonclaim-network:
    driver: bridge

volumes:
  redis-data:
